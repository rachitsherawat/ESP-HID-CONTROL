<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESP32 Wireless HID</title>
    <style>
        :root {
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #38bdf8;
            --text: #f1f5f9;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status {
            font-size: 0.8rem;
            display: flex;
            gap: 10px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            background: #ef4444;
        }

        .dot.online { background: #22c55e; box-shadow: 0 0 10px #22c55e; }

        nav {
            display: flex;
            background: var(--glass);
            margin: 10px;
            border-radius: 12px;
            padding: 4px;
        }

        nav button {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--text);
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        nav button.active {
            background: var(--accent);
            color: var(--bg);
            font-weight: bold;
        }

        main {
            flex: 1;
            padding: 10px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .tab-content { display: none; height: 100%; flex-direction: column; }
        .tab-content.active { display: flex; }

        /* Keyboard Styles */
        .key-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 5px;
        }

        .key {
            aspect-ratio: 1;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            user-select: none;
            cursor: pointer;
            transition: 0.1s;
        }

        .key:active {
            background: var(--accent);
            transform: scale(0.95);
        }

        .key.wide { grid-column: span 2; aspect-ratio: unset; }

        /* Trackpad Styles */
        .trackpad {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 2px dashed var(--glass-border);
            border-radius: 20px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            touch-action: none;
        }

        .trackpad::after {
            content: "Touchpad";
            opacity: 0.3;
            font-weight: bold;
        }

        .mouse-buttons {
            display: flex;
            gap: 10px;
            height: 80px;
        }

        .mouse-btn {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mouse-btn:active { background: var(--glass-border); }

    </style>
</head>
<body>

<header>
    <div>ESP32 Controller</div>
    <div class="status">
        <span>WS: <span id="ws-status" class="dot"></span></span>
    </div>
</header>

<nav>
    <button id="btn-kb" class="active" onclick="showTab('kb')">Keyboard</button>
    <button id="btn-mouse" onclick="showTab('mouse')">Trackpad</button>
</nav>

<main>
    <!-- Keyboard Tab -->
    <div id="tab-kb" class="tab-content active">
        <div class="key-grid" id="kb-grid">
            <!-- Row 1 -->
            <div class="key" data-key="20">Q</div><div class="key" data-key="26">W</div><div class="key" data-key="8">E</div><div class="key" data-key="21">R</div><div class="key" data-key="23">T</div>
            <div class="key" data-key="28">Y</div><div class="key" data-key="24">U</div><div class="key" data-key="12">I</div><div class="key" data-key="18">O</div><div class="key" data-key="19">P</div>
            <!-- Row 2 -->
            <div class="key" data-key="4">A</div><div class="key" data-key="22">S</div><div class="key" data-key="7">D</div><div class="key" data-key="9">F</div><div class="key" data-key="10">G</div>
            <div class="key" data-key="11">H</div><div class="key" data-key="13">J</div><div class="key" data-key="14">K</div><div class="key" data-key="15">L</div><div class="key" data-key="40">Ent</div>
            <!-- Row 3 -->
            <div class="key" data-key="29">Z</div><div class="key" data-key="27">X</div><div class="key" data-key="6">C</div><div class="key" data-key="25">V</div><div class="key" data-key="5">B</div>
            <div class="key" data-key="17">N</div><div class="key" data-key="16">M</div><div class="key" data-key="44" class="wide">Space</div><div class="key" data-key="42">Bksp</div>
        </div>
        <div style="margin-top: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
            <div class="key wide" data-key="224" id="ctrl-toggle">CTRL</div>
            <div class="key wide" data-key="226" id="alt-toggle">ALT</div>
            <div class="key wide" data-key="227" id="win-toggle">WIN</div>
        </div>
    </div>

    <!-- Mouse Tab -->
    <div id="tab-mouse" class="tab-content">
        <div class="trackpad" id="trackpad"></div>
        <div class="mouse-buttons">
            <div class="mouse-btn" id="m-left">Left</div>
            <div class="mouse-btn" id="m-right">Right</div>
        </div>
    </div>
</main>

<script>
    let socket;
    const wsStatus = document.getElementById('ws-status');

    function connect() {
        socket = new WebSocket(`ws://${location.host}/ws`);
        
        socket.onopen = () => {
            wsStatus.classList.add('online');
            console.log("Connected to ESP32");
        };

        socket.onclose = () => {
            wsStatus.classList.remove('online');
            setTimeout(connect, 2000);
        };
    }

    function sendCommand(cmd) {
        if (socket && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify(cmd));
        }
    }

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-${id}`).classList.add('active');
        document.getElementById(`btn-${id}`).classList.add('active');
    }

    // Keyboard Logic
    document.querySelectorAll('.key').forEach(k => {
        k.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const key = parseInt(k.dataset.key);
            sendCommand({ type: 'keyboard', action: 'tap', key: key });
            if (window.navigator.vibrate) window.navigator.vibrate(10);
        });
    });

    // Trackpad Logic
    const trackpad = document.getElementById('trackpad');
    let lastX = 0, lastY = 0;

    trackpad.addEventListener('touchstart', (e) => {
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
    });

    trackpad.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const curX = e.touches[0].clientX;
        const curY = e.touches[0].clientY;
        const dx = Math.round(curX - lastX);
        const dy = Math.round(curY - lastY);
        
        if (dx !== 0 || dy !== 0) {
            sendCommand({ type: 'mouse', x: dx, y: dy });
            lastX = curX;
            lastY = curY;
        }
    });

    // Mouse Buttons
    document.getElementById('m-left').addEventListener('touchstart', () => sendCommand({ type: 'mouse', btn: 1 }));
    document.getElementById('m-left').addEventListener('touchend', () => sendCommand({ type: 'mouse', btn: 0 }));
    document.getElementById('m-right').addEventListener('touchstart', () => sendCommand({ type: 'mouse', btn: 2 }));
    document.getElementById('m-right').addEventListener('touchend', () => sendCommand({ type: 'mouse', btn: 0 }));

    connect();
</script>

</body>
</html>
